<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Company AI Chatbot</title>

<style>
  :root{
    --bg: #ffffff;
    --panel: #ffffff;
    --line: #e9edf2;
    --muted: #6b7280;
    --text: #0f172a;
    --chip: #f3f4f6;
    --shadow: 0 12px 30px rgba(0,0,0,.08);
    --radius: 16px;
    --user: #4285f4;
    --bot: #f3f4f6;
  }

  *{ box-sizing: border-box; }

  body{
    font-family: 'Suit', sans-serif;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display:flex;
    justify-content:center;
  }

  /* 전체 래퍼: ChatGPT 느낌(좌우 여백 + 가운데 패널) */
  .page{
    width: 100%;
    max-width: 1300px;
    height: 100vh;
    display:flex;
    flex-direction: column;
    background: var(--panel);
  }

  /* 상단바 */
  .topbar{
    height: 64px;
    display:flex;
    align-items:center;
    justify-content: center;
    position: relative;
    /* border-bottom: 1px solid var(--line); */
    background: #fff;
  }

  .logo{
    max-width: 240px;
    width: 100%;
    height: auto;
    display:block;
  }

  /* 우측 상단 메뉴 버튼 */
  .menu-btn{
    position: absolute;
    right: 14px;
    top: 12px;
    width: 40px;
    height: 40px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: #fff;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor: pointer;
    transition: .15s;
    z-index: 30;
  }
  .menu-btn:hover{ background:#f8fafc; }
  .menu-btn:active{ transform: scale(.98); }

  .menu-btn .bars{
    width: 18px;
    height: 12px;
    position: relative;
  }
  .menu-btn .bars span{
    position:absolute;
    left:0;
    width:100%;
    height:2px;
    background:#111827;
    border-radius: 2px;
    transition: .2s;
  }
  .menu-btn .bars span:nth-child(1){ top:0; }
  .menu-btn .bars span:nth-child(2){ top:5px; }
  .menu-btn .bars span:nth-child(3){ top:10px; }
  .menu-btn.is-open .bars span:nth-child(1){ top:5px; transform: rotate(45deg); }
  .menu-btn.is-open .bars span:nth-child(2){ opacity: 0; }
  .menu-btn.is-open .bars span:nth-child(3){ top:5px; transform: rotate(-45deg); }

  /* 본문(채팅) */
  .chat-area{
    flex: 1;
    overflow-y: auto;
    padding: 18px 12px 8px 12px;
    background: #fff;
  }

  /* ChatGPT 느낌: 가운데로 정렬된 메시지 라인 */
  .messages{
    width: 100%;
    max-width: 820px;
    margin: 0 auto;
    display:flex;
    flex-direction: column;
    gap: 12px;
    padding-bottom: 20px;
  }

  /* 한 줄(아바타 + 말풍선) */
  .row{
    display:flex;
    gap: 10px;
    align-items:flex-end;
  }
  .row.user{ justify-content: flex-end; }
  .row.bot{ justify-content: flex-start; }

  .avatar{
    width: 32px;
    height: 32px;
    border-radius: 12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight: 900;
    font-size: 12px;
    border: 1px solid var(--line);
    background: #fff;
    color: #111827;
    flex: 0 0 auto;
  }

  /* 말풍선 */
  .bubble{
    max-width: min(680px, 78vw);
    padding: 12px 14px;
    border-radius: 16px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
    border: 1px solid transparent;
  }
  .row.bot .bubble{
    background: var(--bot);
    color: #111827;
    border-color: #eef2f7;
    border-bottom-left-radius: 6px;
  }
  .row.user .bubble{
    background: var(--user);
    color: #fff;
    border-bottom-right-radius: 6px;
  }

  /* 상단 안내(봇 첫 메시지처럼) */
  .hint{
    width: 100%;
    max-width: 820px;
    margin: 14px auto 0 auto;
    display:flex;
    align-items:center;
    gap: 10px;
    color: var(--muted);
    font-size: 13px;
  }
  .hint .pill{
    background: var(--chip);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px 10px;
    font-weight: 700;
    color:#111827;
  }

  /* 하단 입력바(고정 느낌) */
  .composer-wrap{
    /* border-top: 1px solid var(--line); */
    background: #fff;
    padding: 14px 12px 18px 12px;
  }
  .composer{
    width: 100%;
    max-width: 820px;
    margin: 0 auto;
    display:flex;
    gap: 10px;
    align-items:flex-end;
  }

  textarea{
    flex:1;
    padding: 14px 16px;
    border: 1px solid var(--line);
    border-radius: 18px;
    font-size: 15px;
    outline: none;
    resize: none;
    overflow: hidden;
    line-height: 1.5;
    font-family: inherit;
    height: calc(1.5em + 28px); /* 1줄 */
    background:#fff;
    transition: .15s;
  }
  textarea:focus{
    border-color: #c7d2fe;
    box-shadow: 0 0 0 3px rgba(99,102,241,.15);
  }

  .send-btn{
    height: 44px;
    padding: 0 16px;
    border: 1px solid #4285f4;
    border-radius: 14px;
    background: #4285f4;
    color: #fff;
    font-weight: 800;
    cursor: pointer;
    transition: .15s;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .send-btn:hover{ background:#1d4ed8; }
  .send-btn:disabled{
    background:#cbd5e1;
    border-color:#cbd5e1;
    cursor: not-allowed;
  }

  .loading{
    width: 100%;
    max-width: 820px;
    margin: 8px auto 0 auto;
    color: var(--muted);
    font-size: 12px;
    display:none;
  }

  /* 사이드 메뉴 */
  .side-overlay{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.35);
    opacity: 0;
    pointer-events: none;
    transition: .2s;
    z-index: 40;
  }
  .side-overlay.show{
    opacity: 1;
    pointer-events: auto;
  }

  .side-menu{
    position: fixed;
    top: 0;
    right: 0;
    width: 290px;
    max-width: 82vw;
    height: 100vh;
    background: #fff;
    border-left: 1px solid var(--line);
    transform: translateX(100%);
    transition: .25s ease;
    z-index: 50;
    display:flex;
    flex-direction: column;
  }
  .side-menu.open{ transform: translateX(0); }

  .side-menu__head{
    height: 64px;
    padding: 0 14px;
    display:flex;
    align-items:center;
    justify-content: space-between;
    border-bottom: 1px solid var(--line);
  }
  .side-menu__title{ font-weight: 900; }
  .side-menu__close{
    width: 38px;
    height: 38px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background:#fff;
    cursor:pointer;
  }
  .side-menu__close:hover{ background:#f8fafc; }

  .side-menu__list{
    padding: 10px;
    display:flex;
    flex-direction: column;
    gap: 6px;
  }
  .side-menu__item{
    width: 100%;
    text-align: left;
    padding: 12px 12px;
    border-radius: 12px;
    border: 1px solid transparent;
    background: #fff;
    cursor: pointer;
    font-weight: 800;
    color: #111827;
    transition: .15s;
  }
  .side-menu__item:hover{
    background:#f8fafc;
    border-color:#eef2f7;
  }
  .side-menu__item small{
    display:block;
    margin-top: 2px;
    color: var(--muted);
    font-weight: 700;
  }

  /* 모바일 대응 */
  @media (max-width: 520px){
    .topbar{ height: 58px; }
    .logo{ max-width: 200px; }
    .bubble{ max-width: 82vw; }
  }
</style>
</head>

<body>
  <div class="page">
    <!-- 상단바 -->
    <div class="topbar">
      <img class="logo" src="/static/img/samajung-logo.png" alt="" />

      <button class="menu-btn" id="menuBtn" type="button" aria-label="메뉴 열기">
        <div class="bars" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </button>
    </div>

    <!-- 채팅 -->
    <div class="chat-area" id="chatScroll">
      <div class="hint">
        <span class="pill">Tip</span>
        질문을 입력하고 Enter로 전송, Shift+Enter로 줄바꿈 할 수 있어요.
      </div>

      <div class="messages" id="chat-box">
        <!-- 첫 메시지 -->
        <div class="row bot">
          <div class="avatar" aria-hidden="true">AI</div>
          <div class="bubble">안녕하세요! 회사에 대해 무엇이든 물어보세요.</div>
        </div>
      </div>
    </div>

    <!-- 입력 -->
    <div class="composer-wrap">
      <div class="composer">
        <textarea id="user-input" rows="1" placeholder="메시지를 입력하세요..."></textarea>
        <button class="send-btn" onclick="sendMessage()" id="send-btn">전송</button>
      </div>
      <div class="loading" id="loading">답변 생성 중...</div>
    </div>
  </div>

  <!-- 사이드 메뉴 -->
  <div class="side-overlay" id="sideOverlay"></div>

  <aside class="side-menu" id="sideMenu" aria-hidden="true">
    <div class="side-menu__head">
      <div class="side-menu__title">Menu</div>
      <button class="side-menu__close" id="sideClose" type="button" aria-label="메뉴 닫기">✕</button>
    </div>

    <nav class="side-menu__list">
      <button class="side-menu__item" type="button" data-link="main">
        Main <small>메인으로 이동</small>
      </button>
      <button class="side-menu__item" type="button" data-link="about">
        About <small>회사 소개</small>
      </button>
      <button class="side-menu__item" type="button" data-link="catalyst">
        Catalyst <small>주요 사업/기술</small>
      </button>
      <button class="side-menu__item" type="button" data-link="contact">
        Contact <small>문의하기</small>
      </button>
    </nav>
  </aside>

<script>
  const inputField = document.getElementById('user-input');

  // Enter = 전송 / Shift+Enter = 줄바꿈
  inputField.addEventListener('keydown', function(event) {
    if (event.key === 'Enter' && !event.shiftKey) {
      event.preventDefault();
      sendMessage();
    }
  });

  // 자동 높이 조절 + 다 지우면 1줄로 복귀
  inputField.addEventListener('input', function () {
    this.style.height = 'auto';

    if (this.value.trim() === '') {
      this.style.height = 'calc(1.5em + 28px)';
    } else {
      this.style.height = this.scrollHeight + 'px';
    }
  });

  async function sendMessage() {
    const sendBtn = document.getElementById('send-btn');
    const loading = document.getElementById('loading');

    const question = inputField.value.trim();
    if (!question) return;

    appendMessage(question, 'user');

    inputField.value = '';
    inputField.style.height = 'calc(1.5em + 28px)';

    inputField.disabled = true;
    sendBtn.disabled = true;
    loading.style.display = 'block';

    try {
      const response = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ msg: question })
      });

      const data = await response.json();
      appendMessage(data.answer, 'bot');
    } catch (error) {
      appendMessage("오류가 발생했습니다.", 'bot');
    }

    inputField.disabled = false;
    sendBtn.disabled = false;
    loading.style.display = 'none';
    inputField.focus();
  }

  function appendMessage(text, who) {
    const chatBox = document.getElementById('chat-box');
    const row = document.createElement('div');
    row.className = 'row ' + (who === 'user' ? 'user' : 'bot');

    if (who === 'bot') {
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.innerText = 'AI';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerText = text;

      row.appendChild(avatar);
      row.appendChild(bubble);
    } else {
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerText = text;
      row.appendChild(bubble);
    }

    chatBox.appendChild(row);

    // 스크롤 하단 고정
    const chatScroll = document.getElementById('chatScroll');
    chatScroll.scrollTop = chatScroll.scrollHeight;
  }

  // 사이드 메뉴 토글
  const menuBtn = document.getElementById('menuBtn');
  const sideMenu = document.getElementById('sideMenu');
  const sideOverlay = document.getElementById('sideOverlay');
  const sideClose = document.getElementById('sideClose');

  function openMenu() {
    sideMenu.classList.add('open');
    sideOverlay.classList.add('show');
    menuBtn.classList.add('is-open');
    sideMenu.setAttribute('aria-hidden', 'false');
    sideClose.focus();
  }

  function closeMenu() {
    sideMenu.classList.remove('open');
    sideOverlay.classList.remove('show');
    menuBtn.classList.remove('is-open');
    sideMenu.setAttribute('aria-hidden', 'true');
    menuBtn.focus();
  }

  function toggleMenu() {
    if (sideMenu.classList.contains('open')) closeMenu();
    else openMenu();
  }

  menuBtn.addEventListener('click', toggleMenu);
  sideClose.addEventListener('click', closeMenu);
  sideOverlay.addEventListener('click', closeMenu);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && sideMenu.classList.contains('open')) closeMenu();
  });

  // 메뉴 클릭 동작(원하는 방식으로 바꿔 쓰면 됨)
  document.querySelectorAll('.side-menu__item').forEach((btn) => {
    btn.addEventListener('click', () => {
        const link = btn.getAttribute('data-link');

        const routes = {
        main: "https://samjungenr.imweb.me/main",
        about: "https://samjungenr.imweb.me/aboutus",
        catalyst: "https://samjungenr.imweb.me/catalyst",
        contact: "https://samjungenr.imweb.me/contact"
        };

        if (routes[link]) {
        window.location.href = routes[link];
        }

        closeMenu();
    });
    });
</script>
</body>
</html>
