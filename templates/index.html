<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Company AI Chatbot</title>

<style>
  :root{
    --bg: #ffffff;
    --panel: #ffffff;
    --line: #e9edf2;
    --muted: #6b7280;
    --text: #0f172a;
    --chip: #f3f4f6;
    --user: #4285f4;
    --bot: #f3f4f6;
  }

  *{ box-sizing: border-box; }

  html, body{
    height: 100%;
  }

  body{
    font-family: 'Suit', sans-serif;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    display:flex;
    justify-content:center;
  }

  .page{
    width: 100%;
    max-width: 1920px;
    height: 100vh;
    display:flex;
    flex-direction: column;
    background: var(--panel);
  }

  .topbar{
    display:flex;
    align-items:center;
    justify-content:center;
    position: relative;
    background: #fff;
    padding: 13px 0;
    flex-shrink: 0;
  }

  .logo{
    max-width: 240px;
    width: 100%;
    height: auto;
    display:block;
    cursor: pointer;
  }

  .menu-btn{
    position: absolute;
    right: 20px;
    top: 20px;
    width: 40px;
    height: 40px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: #fff;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor: pointer;
    transition: .15s;
    z-index: 30;
  }
  .menu-btn:hover{ background:#f8fafc; }
  .menu-btn:active{ transform: scale(.98); }

  .menu-btn .bars{ width: 18px; height: 12px; position: relative; }
  .menu-btn .bars span{
    position:absolute;
    left:0;
    width:100%;
    height:2px;
    background:#111827;
    border-radius:2px;
    transition:.2s;
  }
  .menu-btn .bars span:nth-child(1){ top:0; }
  .menu-btn .bars span:nth-child(2){ top:5px; }
  .menu-btn .bars span:nth-child(3){ top:10px; }
  .menu-btn.is-open .bars span:nth-child(1){ top:5px; transform: rotate(45deg); }
  .menu-btn.is-open .bars span:nth-child(2){ opacity: 0; }
  .menu-btn.is-open .bars span:nth-child(3){ top:5px; transform: rotate(-45deg); }

  .landing{
    flex: 1;
    display:flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 18px;
    margin-top: 2%;
    margin-bottom: 5%;
    padding: 0 16px 40px;
    background:#fff;
    min-height: 0;
  }

  .landing-title{
    font-size: 34px;
    font-weight: 900;
    letter-spacing: -0.02em;
    margin: 0;
    text-align:center;
  }

  .landing-sub{
    margin: 0;
    color: var(--muted);
    font-size: 14px;
    text-align:center;
  }

  .landing-composer{
    width: 100%;
    max-width: 820px;
    display:flex;
    gap: 10px;
    align-items: flex-end;
    margin-top: 10px;
  }

  .landing textarea{
    flex:1;
    padding: 16px 18px;
    border: 1px solid var(--line);
    border-radius: 18px;
    font-size: 15px;
    outline: none;
    resize: none;
    overflow: hidden;
    line-height: 1.5;
    font-family: inherit;
    height: 55px;
    max-height: 180px;
    background:#fff;
    transition: .15s;
  }

  .landing textarea:focus,
  .chat-mode textarea:focus{
    border-color: #c7d2fe;
    box-shadow: 0 0 0 3px rgba(99,102,241,.15);
  }

  .send-btn{
    width: 52px;
    height: 52px;
    border: 1px solid #4285f4;
    border-radius: 999px;
    background: #4285f4;
    cursor: pointer;
    transition: .15s;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink: 0;
  }

  .send-btn svg{ width:20px; height:20px; }
  .send-btn:hover{ background:#1d4ed8; }
  .send-btn:disabled{
    background:#cbd5e1;
    border-color:#cbd5e1;
    cursor:not-allowed;
  }

  .chips{
    width: 100%;
    max-width: 820px;
    display:flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content:center;
    margin-top: 8px;
  }

  .chip{
    border: 1px solid var(--line);
    background: #fff;
    color: #111827;
    border-radius: 999px;
    padding: 10px 14px;
    font-weight: 800;
    cursor:pointer;
    transition:.15s;
  }
  .chip:hover{ background:#f8fafc; }

  .chat-mode{
    display:none;
    flex:1;
    min-height: 0;
    flex-direction: column;
    background:#fff;
  }

  .chat-area{
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 18px 12px 8px;
    background: #fff;
    scroll-behavior: smooth;
  }

  .hint{
    width: 100%;
    max-width: 820px;
    margin: 14px auto 20px;
    display:flex;
    align-items:center;
    gap: 10px;
    color: var(--muted);
    font-size: 13px;
  }

  .hint .pill{
    background: var(--chip);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px 10px;
    font-weight: 700;
    color:#111827;
  }

  .messages{
    width: 100%;
    max-width: 820px;
    margin: 0 auto;
    display:flex;
    flex-direction: column;
    gap: 12px;
    padding-bottom: 20px;
  }

  .row{
    display:flex;
    gap: 10px;
    align-items:flex-end;
  }

  .row.user{ justify-content: flex-end; }
  .row.bot{ justify-content: flex-start; }

  .bubble{
    max-width: min(680px, 78vw);
    padding: 12px 14px;
    border-radius: 16px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
    border: 1px solid transparent;
  }

  .row.bot .bubble{
    background: var(--bot);
    color: #111827;
    border-color: #eef2f7;
    border-bottom-left-radius: 6px;
  }

  .row.user .bubble{
    background: var(--user);
    color: #fff;
    border-bottom-right-radius: 6px;
  }

  .bubble a{
    color: inherit;
    text-decoration: underline;
    word-break: break-all;
  }

  .loading{
    width: 100%;
    max-width: 820px;
    margin: 8px auto 16px;
    color: var(--muted);
    font-size: 12px;
    display:none;
  }

  .composer-wrap{
    flex-shrink: 0;
    background: #fff;
    padding: 14px 12px 18px;
    border-top: 1px solid rgba(233, 237, 242, .7);
  }

  .composer{
    width: 100%;
    max-width: 820px;
    margin: 0 auto;
    display:flex;
    gap: 10px;
    align-items:flex-end;
  }

  .chat-mode textarea{
    flex:1;
    padding: 16px 18px;
    border: 1px solid var(--line);
    border-radius: 18px;
    font-size: 15px;
    outline: none;
    resize: none;
    overflow: hidden;
    line-height: 1.5;
    font-family: inherit;
    height: 55px;
    max-height: 180px;
    background:#fff;
    transition: .15s;
  }

  .side-overlay{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.35);
    opacity: 0;
    pointer-events: none;
    transition: .2s;
    z-index: 40;
  }
  .side-overlay.show{ opacity: 1; pointer-events: auto; }

  .side-menu{
    position: fixed;
    top: 0;
    right: 0;
    width: 290px;
    max-width: 82vw;
    height: 100vh;
    background: #fff;
    border-left: 1px solid var(--line);
    transform: translateX(100%);
    transition: .25s ease;
    z-index: 50;
    display:flex;
    flex-direction: column;
  }
  .side-menu.open{ transform: translateX(0); }

  .side-menu__head{
    height: 64px;
    padding: 0 14px;
    display:flex;
    align-items:center;
    justify-content: space-between;
    border-bottom: 1px solid var(--line);
  }

  .side-menu__title{ font-weight: 900; }

  .side-menu__close{
    width: 38px;
    height: 38px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background:#fff;
    cursor:pointer;
  }
  .side-menu__close:hover{ background:#f8fafc; }

  .side-menu__list{
    padding: 10px;
    display:flex;
    flex-direction: column;
    gap: 6px;
  }

  .side-menu__item{
    width: 100%;
    text-align: left;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid transparent;
    background: #fff;
    cursor: pointer;
    font-weight: 800;
    color: #111827;
    transition: .15s;
  }

  .side-menu__item:hover{
    background:#f8fafc;
    border-color:#eef2f7;
  }

  .side-menu__item small{
    display:block;
    margin-top: 2px;
    color: var(--muted);
    font-weight: 700;
  }

  .tw-cursor{
    display:inline-block;
    width: 8px;
    margin-left: 2px;
    opacity: .7;
    animation: twBlink 1s steps(2, start) infinite;
  }

  @keyframes twBlink {
    to { opacity: 0; }
  }

  @media (max-width: 520px){
    .logo{ max-width: 200px; }
    .bubble{ max-width: 82vw; }
    .landing-title{ font-size: 28px; }
    .send-btn{ width: 48px; height: 48px; }
    .landing textarea{ height: 48px; max-height:48px; }
    .chat-mode textarea{ min-height: 48px; }
    .composer-wrap{ padding: 12px 12px 14px; }
  }
</style>
</head>

<body>
  <div class="page">
    <div class="topbar">
      <!-- <img class="logo" src="/static/img/samajung-logo.png" alt="" onclick="location.href='/'" /> -->

      <button class="menu-btn" id="menuBtn" type="button" aria-label="메뉴 열기">
        <div class="bars" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </button>
    </div>

    <section class="landing" id="landing">
      <h1 class="landing-title">무엇을 도와드릴까요?</h1>
      <p class="landing-sub">회사/사업/기술 등 무엇이든 물어보세요.</p>

      <div class="landing-composer">
        <textarea id="landing-input" rows="1" placeholder="무엇이든 물어보세요"></textarea>
        <button class="send-btn" id="landing-send" type="button" aria-label="전송">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M3 11.5L21 3L12.5 21L11 13L3 11.5Z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <div class="chips">
        <button class="chip" data-q="회사 소개를 해줘">회사 소개</button>
        <button class="chip" data-q="주요 사업 분야와 강점은 뭐야?">사업 분야</button>
        <button class="chip" data-q="chmo에 대해 설명해줘">CHMO</button>
        <button class="chip" data-q="heradee에 대해 설명해줘">HERADEE</button>
      </div>
    </section>

    <section class="chat-mode" id="chatMode">
      <div class="chat-area" id="chatScroll">
        <div class="hint">
          <span class="pill">Tip</span>
          Enter로 전송, Shift+Enter로 줄바꿈 할 수 있어요.
        </div>

        <div class="messages" id="chat-box"></div>
        <div class="loading" id="loading">답변 생성 중...</div>
      </div>

      <div class="composer-wrap">
        <div class="composer">
          <textarea id="user-input" rows="1" placeholder="메시지를 입력하세요..."></textarea>

          <button class="send-btn" onclick="sendMessage()" id="send-btn" aria-label="전송">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M3 11.5L21 3L12.5 21L11 13L3 11.5Z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    </section>
  </div>

  <div class="side-overlay" id="sideOverlay"></div>

  <aside class="side-menu" id="sideMenu" aria-hidden="true">
    <div class="side-menu__head">
      <div class="side-menu__title">Menu</div>
      <button class="side-menu__close" id="sideClose" type="button" aria-label="메뉴 닫기">✕</button>
    </div>

    <nav class="side-menu__list">
      <button class="side-menu__item" type="button" data-link="main">MAIN <small>메인으로 이동</small></button>
      <button class="side-menu__item" type="button" data-link="heradee">HERADEE <small>헤라디 소개</small></button>
      <button class="side-menu__item" type="button" data-link="aixoz">AiXOZ <small>aixoz 소개</small></button>
      <button class="side-menu__item" type="button" data-link="chmo">CHMO <small>크모 소개</small></button>
    </nav>
  </aside>

<script>
  const landing = document.getElementById('landing');
  const chatMode = document.getElementById('chatMode');

  const landingInput = document.getElementById('landing-input');
  const landingSend = document.getElementById('landing-send');

  const inputField = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const loading = document.getElementById('loading');
  const chatScroll = document.getElementById('chatScroll');
  const chatBox = document.getElementById('chat-box');

  let userScrolledUp = false;
  let isTypingResponse = false;

  function goChatMode() {
    landing.style.display = 'none';
    chatMode.style.display = 'flex';
  }

  function isNearBottom() {
    const threshold = 100;
    return chatScroll.scrollHeight - chatScroll.scrollTop - chatScroll.clientHeight < threshold;
  }

  function scrollToBottom(smooth = false, force = false) {
    if (!force && userScrolledUp) return;

    chatScroll.scrollTo({
      top: chatScroll.scrollHeight,
      behavior: smooth ? 'smooth' : 'auto'
    });
  }

  function attachAutoResize(textarea, maxHeight) {
    if (!textarea) return;

    const baseHeight = 55;

    function resize() {
      textarea.style.height = '0px';
      const next = Math.min(maxHeight, textarea.scrollHeight);

      if (textarea.value.trim() === '') {
        textarea.style.height = baseHeight + 'px';
        textarea.style.overflowY = 'hidden';
        return;
      }

      textarea.style.height = next + 'px';
      textarea.style.overflowY = textarea.scrollHeight > maxHeight ? 'auto' : 'hidden';
    }

    textarea.addEventListener('input', resize);
    textarea.addEventListener('paste', () => setTimeout(resize, 0));
    textarea.addEventListener('cut', () => setTimeout(resize, 0));
    textarea.addEventListener('keyup', (e) => {
      if (e.key === 'Enter') resize();
    });

    resize();
  }

  attachAutoResize(landingInput, 180);
  attachAutoResize(inputField, 180);

  landingInput.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;

    if (e.shiftKey) {
      requestAnimationFrame(() => {
        landingInput.dispatchEvent(new Event('input'));
      });
      return;
    }

    e.preventDefault();
    startFromLanding();
  });

  landingSend.addEventListener('click', startFromLanding);

  function startFromLanding() {
    const q = landingInput.value.trim();
    const baseHeight = 55;

    if (!q) return;

    goChatMode();

    inputField.value = q;
    inputField.dispatchEvent(new Event('input'));

    requestAnimationFrame(() => {
      userScrolledUp = false;
      scrollToBottom(true, true);
      sendMessage();
    });

    landingInput.value = '';
    landingInput.style.height = baseHeight + 'px';
    landingInput.style.overflowY = 'hidden';
  }

  document.querySelectorAll('.chip').forEach((btn) => {
    btn.addEventListener('click', () => {
      landingInput.value = btn.getAttribute('data-q') || '';
      landingInput.dispatchEvent(new Event('input'));
      startFromLanding();
    });
  });

  inputField.addEventListener('keydown', function (event) {
    if (event.key !== 'Enter') return;

    if (event.shiftKey) {
      requestAnimationFrame(() => {
        inputField.dispatchEvent(new Event('input'));
      });
      return;
    }

    event.preventDefault();
    sendMessage();
  });

  chatScroll.addEventListener('scroll', () => {
    userScrolledUp = !isNearBottom();
  });

  function sleep(ms) {
    return new Promise((resolve) => setTimeout(resolve, ms));
  }

  async function typewriterText(targetEl, text, speed = 12) {
    const cursor = document.createElement('span');
    cursor.className = 'tw-cursor';
    cursor.textContent = '▍';

    targetEl.textContent = '';
    targetEl.appendChild(cursor);

    let i = 0;
    isTypingResponse = true;

    while (i < text.length) {
      cursor.insertAdjacentText('beforebegin', text[i]);
      i++;

      scrollToBottom(false, false);
      await sleep(speed);
    }

    cursor.remove();
    isTypingResponse = false;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function convertLinks(text) {
    const escaped = escapeHtml(text);
    const urlRegex = /(https?:\/\/[^\s<]+)/g;

    return escaped.replace(urlRegex, function (url) {
      return '<a href="' + url + '" target="_blank" rel="noopener noreferrer">' + url + '</a>';
    });
  }

  function appendMessage(text, who) {
    const row = document.createElement('div');
    row.className = 'row ' + (who === 'user' ? 'user' : 'bot');

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (who === 'user') {
      bubble.innerText = text;
    }

    row.appendChild(bubble);
    chatBox.appendChild(row);

    scrollToBottom(false, false);

    return bubble;
  }

  async function sendMessage() {
    const baseHeight = 55;
    const question = inputField.value.trim();

    if (!question) return;

    if (chatMode.style.display !== 'flex') goChatMode();

    userScrolledUp = false;

    appendMessage(question, 'user');

    requestAnimationFrame(() => {
      scrollToBottom(true, true);
    });

    inputField.value = '';
    inputField.style.height = baseHeight + 'px';
    inputField.style.overflowY = 'hidden';
    inputField.scrollTop = 0;

    inputField.disabled = true;
    sendBtn.disabled = true;

    loading.style.display = 'block';

    requestAnimationFrame(() => {
      scrollToBottom(true, true);
    });

    try {
      const response = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ msg: question })
      });

      const data = await response.json();

      loading.style.display = 'none';
      scrollToBottom(false, true);

      const botBubble = appendMessage('', 'bot');

      await typewriterText(botBubble, data.answer || '', 12);

      botBubble.innerHTML = convertLinks(data.answer || '');

      requestAnimationFrame(() => {
        scrollToBottom(false, true);
      });

    } catch (error) {
      isTypingResponse = false;
      loading.style.display = 'none';
      appendMessage('오류가 발생했습니다.', 'bot');

      requestAnimationFrame(() => {
        scrollToBottom(false, true);
      });
    }

    inputField.disabled = false;
    sendBtn.disabled = false;
    inputField.focus();
  }

  const menuBtn = document.getElementById('menuBtn');
  const sideMenu = document.getElementById('sideMenu');
  const sideOverlay = document.getElementById('sideOverlay');
  const sideClose = document.getElementById('sideClose');

  function openMenu() {
    sideMenu.classList.add('open');
    sideOverlay.classList.add('show');
    menuBtn.classList.add('is-open');
    sideMenu.setAttribute('aria-hidden', 'false');
    sideClose.focus();
  }

  function closeMenu() {
    sideMenu.classList.remove('open');
    sideOverlay.classList.remove('show');
    menuBtn.classList.remove('is-open');
    sideMenu.setAttribute('aria-hidden', 'true');
    menuBtn.focus();
  }

  function toggleMenu() {
    if (sideMenu.classList.contains('open')) closeMenu();
    else openMenu();
  }

  menuBtn.addEventListener('click', toggleMenu);
  sideClose.addEventListener('click', closeMenu);
  sideOverlay.addEventListener('click', closeMenu);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && sideMenu.classList.contains('open')) closeMenu();
  });

  document.querySelectorAll('.side-menu__item').forEach((btn) => {
    btn.addEventListener('click', () => {
      const link = btn.getAttribute('data-link');

      const routes = {
        main: 'https://platformoz.com/',
        heradee: 'https://platformoz.com/heradee',
        aixoz: 'https://platformoz.com/aixoz',
        chmo: 'https://platformoz.com/chmo'
      };

      if (routes[link]) window.location.href = routes[link];

      closeMenu();
    });
  });
</script>
</body>
</html>
